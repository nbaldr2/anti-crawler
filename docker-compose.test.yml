version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antibot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  detection-engine:
    build:
      context: ./backend_minimal
      dockerfile: Dockerfile
    command: >
      sh -c "
        # Wait for DB
        while ! nc -z postgres 5432; do sleep 1; done &&
        # Run migrations and seeds
        psql -h postgres -U postgres -d antibot -f database/migrations/V1__initial_schema.sql &&
        psql -h postgres -U postgres -d antibot -f database/seeds/01_default_data.sql &&
        # Start server
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "
    environment:
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/antibot
      REDIS_URL: redis://redis:6379/0
      API_TOKEN: ${API_TOKEN:-dev-admin-token}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./backend_minimal:/app

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      VITE_API_BASE_URL: http://localhost:8000
    depends_on:
      - detection-engine
    volumes:
      - ./frontend:/app
      - /app/node_modules

  tests:
    build:
      context: ./backend_minimal
      dockerfile: Dockerfile.test
    environment:
      TEST_DATABASE_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/antibot_test
    depends_on:
      postgres:
        condition: service_healthy
    volumes:
      - ./backend_minimal:/app
    command: >
      sh -c "
        # Wait for DB
        while ! nc -z postgres 5432; do sleep 1; done &&
        # Create test DB
        psql -h postgres -U postgres -c 'CREATE DATABASE antibot_test;' ||
        psql -h postgres -U postgres -c 'DROP DATABASE antibot_test; CREATE DATABASE antibot_test;' &&
        pytest --junitxml=/reports/backend-tests.xml --cov-report=xml:/reports/coverage.xml
      "

volumes:
  postgres_data:
  redis_data:
