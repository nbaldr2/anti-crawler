version: '3.8'

services:
  postgres:
    image: timescale/timescaledb:latest-pg15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: antibot
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes

  detection-engine:
    build: .
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      DB_URL: postgresql+asyncpg://postgres:postgres@postgres:5432/antibot
      REDIS_URL: redis://redis:6379/0
      API_TOKEN: ${API_TOKEN:-dev-admin-token}
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    volumes:
      - ./app:/app/app

volumes:
  postgres_data:
  redis_data:
